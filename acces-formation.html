<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accès Formation - Trailblazer AJN</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Poppins', sans-serif;
  background:#0d0d0d;
  color:#fff;
  margin:0;
  text-align:center;
}

header {
  background:#111;
  padding:15px;
}

header h1 {
  color:#d4af37;
}

section {
  max-width:500px;
  margin:80px auto;
  background:#111;
  padding:40px;
  border-radius:10px;
  box-shadow:0 0 25px rgba(212,175,55,0.3);
}

input {
  width:90%;
  padding:15px;
  margin:15px 0;
  border:none;
  border-radius:5px;
}

button {
  padding:15px 40px;
  background:#d4af37;
  border:none;
  border-radius:5px;
  font-weight:600;
  cursor:pointer;
}

button:hover {
  background:#fff;
}

.error {
  color:red;
  margin-top:10px;
}

.info {
  color:#ccc;
  font-size:0.9em;
  margin-top:15px;
}
</style>

</head>

<body>

<header>
  <h1>Trailblazer AJN</h1>
</header>

<section>

  <h2>🔐 Accéder à la formation</h2>

  <input type="text" id="code" placeholder="Entrez votre code d'accès">

  <br>

  <button onclick="verifierCode()">Valider</button>

  <div class="error" id="error"></div>

  <div class="info">
    ⚠️ Le code est fourni uniquement après validation.
  </div>

</section>

<script>
function verifierCode(){
  const code = document.getElementById("code").value.trim();
  const error = document.getElementById("error");

  if(code === "AJN0026"){
    window.location.href = "./cours.html";
  } else {
    error.innerText = "Code incorrect.";
  }
}
</script>

</body>
</html>
