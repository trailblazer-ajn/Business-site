<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription - Trailblazer AJN</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Poppins', sans-serif;
  background:#0d0d0d;
  color:#fff;
  margin:0;
  text-align:center;
}

header {
  background:#111;
  padding:15px;
}

header h1 {
  color:#d4af37;
}

section {
  max-width:500px;
  margin:60px auto;
  background:#111;
  padding:40px;
  border-radius:10px;
  box-shadow:0 0 25px rgba(212,175,55,0.3);
}

input {
  width:90%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:5px;
}

button {
  width:95%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:5px;
  font-weight:600;
  cursor:pointer;
  background:#d4af37;
  transition:0.3s;
}

button:hover {
  background:#fff;
  transform:scale(1.03);
}

.login-btn {
  background:#333;
  color:#fff;
}

.login-btn:hover {
  background:#555;
}

.quote {
  color:#d4af37;
  font-style:italic;
  margin-bottom:20px;
}

footer {
  margin-top:40px;
  padding:20px;
  background:#111;
  color:#777;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCtveyVtFUxs6ahNM66hVu3A8vAusYug_4",
  authDomain: "siteformation-5fe51.firebaseapp.com",
  projectId: "siteformation-5fe51",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let loading = false;

// Redirection automatique si connecté
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.replace("./acces-formation.html");
  }
});

// INSCRIPTION
window.registerUser = async function(){
  if (loading) return;
  loading = true;

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    alert("Veuillez remplir tous les champs.");
    loading = false;
    return;
  }

  try {
    await createUserWithEmailAndPassword(auth, email, password);
  } catch (error) {
    alert(error.message);
    loading = false;
  }
};

// CONNEXION
window.loginUser = async function(){
  if (loading) return;
  loading = true;

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    alert("Veuillez remplir tous les champs.");
    loading = false;
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (error) {
    alert("Erreur : " + error.message);
    loading = false;
  }
};
</script>

</head>

<body>

<header>
  <h1>Trailblazer AJN</h1>
</header>

<section>

  <div class="quote">
  "Live as if you were to die tomorrow. Learn as if you were to live forever." – Einstein
  </div>

  <h2>Créer votre compte</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mot de passe">

  <button onclick="registerUser()">S'inscrire</button>

  <button class="login-btn" onclick="loginUser()">Se connecter</button>

</section>

<footer>
  © 2026 Trailblazer AJN — Tous droits réservés
</footer>

</body>
</html>
