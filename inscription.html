<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trailblazer AJN - Inscription</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family:'Poppins', sans-serif; background:#0d0d0d; color:#fff; margin:0; padding:0; text-align:center; }
header { background:#111; padding:20px; display:flex; flex-direction:column; align-items:center; }
header h1 { color:#d4af37; margin:0; }
header nav { margin-top:10px; }
header nav a { color:#fff; margin:0 15px; text-decoration:none; font-weight:600; }
header nav a:hover { color:#d4af37; }
header .quote { font-size:0.9em; color:#ccc; margin-top:5px; font-style:italic; }
.logo { width:80px; height:auto; margin-top:10px; }
section { padding:40px 20px; max-width:600px; margin:auto; }
input, select { width:90%; padding:12px; margin:10px 0; border-radius:5px; border:none; font-size:1em; }
input:focus, select:focus { outline:none; }
button { padding:12px 20px; background:#d4af37; border:none; border-radius:5px; font-weight:600; cursor:pointer; }
button:hover { background:#fff; color:#000; }
.success { color:#0f0; margin-top:10px; }
.error { color:#f00; margin-top:10px; }
footer { text-align:center; padding:40px; background:#111; font-size:14px; color:#777; margin-top:60px; }
</style>

<!-- Firebase SDKs -->
<script type="module">
  // Import the functions you need from the SDKs
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

  // Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyCtveyVtFUxs6ahNM66hVu3A8vAusYug_4",
    authDomain: "siteformation-5fe51.firebaseapp.com",
    projectId: "siteformation-5fe51",
    storageBucket: "siteformation-5fe51.appspot.com",
    messagingSenderId: "812137122401",
    appId: "1:812137122401:web:c76f3d36f27207d72cb820",
    measurementId: "G-DDTYR055VZ"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Handle form submission
  window.registerUser = async function() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;
    const country = document.getElementById("country").value;
    const source = document.getElementById("source").value;
    const password = document.getElementById("password").value;

    if(!name || !email || !phone || !country || !source || !password){
      document.getElementById("message").innerHTML = "<span class='error'>Veuillez remplir tous les champs.</span>";
      return;
    }

    try {
      // Create user
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // Save additional info in Firestore
      await setDoc(doc(db, "users", user.uid), {
        name: name,
        email: email,
        phone: phone,
        country: country,
        source: source,
        createdAt: new Date()
      });

      // Send email verification
      await sendEmailVerification(user);

      document.getElementById("message").innerHTML = "<span class='success'>Compte créé ! Vérifie ton email pour confirmer. Puis tu pourras accéder à la formation.</span>";
      document.getElementById("registrationForm").reset();
    } catch(error) {
      document.getElementById("message").innerHTML = "<span class='error'>" + error.message + "</span>";
    }
  };

  // Check if user is already logged in
  onAuthStateChanged(auth, (user) => {
    if(user && user.emailVerified){
      // Redirect to course page if already verified
      window.location.href = "cours.html";
    }
  });
</script>

</head>
<body>

<header>
  <img src="logo.png" alt="Trailblazer AJN" class="logo">
  <h1>Trailblazer AJN</h1>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="services.html">Services</a>
    <a href="formation.html">Formation</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="quote">« L'apprentissage est le véritable moteur de la réussite. »</div>
</header>

<section>
  <h2>Inscription à la formation Framework S.O.S</h2>
  <form id="registrationForm" onsubmit="event.preventDefault(); registerUser();">
    <input type="text" id="name" placeholder="Nom et Prénom" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="tel" id="phone" placeholder="Téléphone" required>
    <input type="text" id="country" placeholder="Pays d'origine" required>
    <input type="text" id="source" placeholder="Comment as-tu entendu parler de nous ?" required>
    <input type="password" id="password" placeholder="Mot de passe" required>
    <button type="submit">S'inscrire</button>
  </form>
  <div id="message"></div>
</section>

<footer>
  <p>© 2026 Trailblazer AJN — Tous droits réservés</p>
</footer>

</body>
</html>
