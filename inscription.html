<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription - Trailblazer AJN</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Poppins', sans-serif;
  background:#0d0d0d;
  color:#fff;
  margin:0;
  text-align:center;
}

header {
  background:#111;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1 {
  color:#d4af37;
  font-size:1.6em;
}

nav a {
  color:#fff;
  margin-left:20px;
  text-decoration:none;
}

nav a:hover {
  color:#d4af37;
}

section {
  max-width:500px;
  margin:60px auto;
  background:#111;
  padding:40px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(212,175,55,0.3);
}

input {
  width:90%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:5px;
}

.btn {
  display:block;
  width:95%;
  padding:15px;
  margin:10px auto;
  background:#d4af37;
  border:none;
  border-radius:5px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover {
  background:#fff;
  transform:scale(1.03);
}

.login-btn {
  background:#333;
  color:#fff;
}

.login-btn:hover {
  background:#555;
}

.citation {
  color:#d4af37;
  font-style:italic;
  margin-bottom:25px;
}

footer {
  margin-top:40px;
  padding:20px;
  background:#111;
  color:#777;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCtveyVtFUxs6ahNM66hVu3A8vAusYug_4",
  authDomain: "siteformation-5fe51.firebaseapp.com",
  projectId: "siteformation-5fe51",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// INSCRIPTION
window.registerUser = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      sendEmailVerification(userCredential.user);
      window.location.href = "instructions-paiement.html";
    })
    .catch((error) => {
      alert(error.message);
    });
}

// CONNEXION
window.loginUser = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "instructions-paiement.html";
    })
    .catch((error) => {
      alert("Erreur : " + error.message);
    });
}
</script>

</head>

<body>

<header>
  <h1><img src="logo.png" style="height:35px;"> Trailblazer AJN</h1>
  <nav>
    <a href="#">Accueil</a>
    <a href="#">Services</a>
    <a href="#">Formation</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section>

  <div class="citation">
  "Live as if you were to die tomorrow. Learn as if you were to live forever." – Einstein
  </div>

  <h2>Créer votre compte</h2>

  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Mot de passe" required>

  <button class="btn" onclick="registerUser()">S'inscrire</button>

  <button class="btn login-btn" onclick="loginUser()">Se connecter</button>

</section>

<footer>
  © 2026 Trailblazer AJN — Tous droits réservés
</footer>

</body>
</html>
