<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription - Trailblazer AJN</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body { font-family:Poppins; background:#0d0d0d; color:#fff; text-align:center; }
form { max-width:400px; margin:50px auto; display:flex; flex-direction:column; gap:15px; }
input, select {
  padding:12px;
  border:none;
  border-radius:5px;
}
button {
  padding:15px;
  background:#d4af37;
  border:none;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>Créer ton compte</h2>

<form onsubmit="redirectToPayment(event)">
<input type="text" placeholder="Nom et prénom" required>
<input type="email" placeholder="Email" required>
<input type="tel" placeholder="Numéro de téléphone" required>
<input type="text" placeholder="Pays" required>

<select required>
<option value="">Comment avez-vous entendu parler de nous ?</option>
<option>Facebook</option>
<option>WhatsApp</option>
<option>YouTube</option>
<option>Recommandation</option>
</select>

<button type="submit">S'inscrire</button>
</form>

<script>
function redirectToPayment(e){
  e.preventDefault();
  window.location.href = "paiement.html";
}
</script>

</body>
</html>
