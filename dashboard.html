<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard — Framework S.O.S</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  font-family: 'Poppins', sans-serif;
  background: #0a0a0a;
  color: white;
  margin: 0;
  padding: 0;
}

header {
  background: #111;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(212,175,55,0.2);
}

.logo {
  color: #d4af37;
  font-weight: 700;
  font-size: 1.2em;
}

button {
  background: #d4af37;
  border: none;
  padding: 10px 18px;
  cursor: pointer;
  font-weight: bold;
  border-radius: 6px;
}

button:hover {
  background: #e8cc6a;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
}

h1 {
  color: #d4af37;
  margin-bottom: 10px;
}

.subtitle {
  color: #aaa;
  margin-bottom: 40px;
}

.modules {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: #111;
  border: 1px solid rgba(212,175,55,0.15);
  padding: 20px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-4px);
  border-color: rgba(212,175,55,0.4);
}

.card h3 {
  color: #d4af37;
  margin-bottom: 10px;
}

.card p {
  color: #aaa;
  font-size: 0.9em;
  line-height: 1.6;
}

.lock {
  color: #ff4d4d;
  font-size: 0.85em;
  margin-top: 10px;
}

</style>

</head>

<body>
