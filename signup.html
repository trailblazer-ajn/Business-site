<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscription — Framework S.O.S</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0a0a0a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 420px;
  background: #111;
  padding: 30px;
  border-radius: 12px;
  border: 1px solid rgba(212,175,55,0.2);
}

h1 {
  color: #d4af37;
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border: none;
  border-radius: 6px;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #d4af37;
  border: none;
  font-weight: bold;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  background: #e8cc6a;
}

.msg {
  margin-top: 15px;
  text-align: center;
  font-size: 0.9em;
}
</style>
</head>

<body>

<div class="container">
  <h1>Créer ton accès S.O.S</h1>

  <input type="text" id="name" placeholder="Nom complet">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mot de passe">

  <button onclick="signup()">Créer mon compte</button>

  <div class="msg" id="msg"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { 
  getAuth,
  createUserWithEmailAndPassword,
  sendEmailVerification
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBspZonF5HtmN1Xf4Dj5xN8ZBomMLh4ndI",
  authDomain: "trailblazer-sos.firebaseapp.com",
  projectId: "trailblazer-sos",
  storageBucket: "trailblazer-sos.firebasestorage.app",
  messagingSenderId: "524989470668",
  appId: "1:524989470668:web:5cb83b02f46c74905e6f69"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signup = async function () {

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const msg = document.getElementById("msg");

  try {

    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // email verification
    await sendEmailVerification(user);

    // save user in Firestore
    await setDoc(doc(db, "users", user.uid), {
      name: name,
      email: email,
      createdAt: new Date().toISOString(),
      verified: false
    });

    msg.innerHTML = "Compte créé. Vérifie ton email avant de continuer.";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 3000);

  } catch (error) {
    msg.innerHTML = error.message;
  }

};

</script>

</body>
  </html>
