<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formation - Trailblazer AJN</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Poppins', sans-serif;
  margin:0;
  background:#0d0d0d;
  color:#fff;
}

header {
  background:#111;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1 {
  color:#d4af37;
}

.container {
  display:flex;
}

/* Sidebar */
.sidebar {
  width:250px;
  background:#111;
  padding:20px;
  height:100vh;
}

.sidebar h3 {
  color:#d4af37;
}

.sidebar ul {
  list-style:none;
  padding:0;
}

.sidebar li {
  padding:10px;
  cursor:pointer;
  border-radius:5px;
}

.sidebar li:hover {
  background:#222;
}

/* Content */
.content {
  flex:1;
  padding:40px;
}

.video {
  width:100%;
  height:400px;
  border:none;
  border-radius:10px;
  margin-bottom:20px;
}

.module-title {
  font-size:1.5em;
  margin-bottom:10px;
}

.description {
  color:#ccc;
}

footer {
  text-align:center;
  padding:20px;
  background:#111;
  margin-top:30px;
  color:#777;
}
</style>

</head>

<body>

<header>
  <h1>Trailblazer AJN - Formation</h1>
</header>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>Modules</h3>
    <ul>
      <li onclick="loadVideo(1)">Module 1 - Introduction</li>
      <li onclick="loadVideo(2)">Module 2 - Mentalité</li>
      <li onclick="loadVideo(3)">Module 3 - Stratégie</li>
      <li onclick="loadVideo(4)">Module 4 - Monétisation</li>
    </ul>
  </div>

  <!-- Contenu -->
  <div class="content">

    <iframe id="videoPlayer" class="video"
    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
    allowfullscreen></iframe>

    <div class="module-title" id="title">
      Module 1 - Introduction
    </div>

    <div class="description" id="desc">
      Bienvenue dans votre formation Trailblazer AJN.
    </div>

  </div>

</div>

<footer>
  © 2026 Trailblazer AJN — Tous droits réservés
</footer>

<script>
function loadVideo(module){
  const player = document.getElementById("videoPlayer");
  const title = document.getElementById("title");
  const desc = document.getElementById("desc");

  if(module === 1){
    player.src = "https://www.youtube.com/embed/dQw4w9WgXcQ";
    title.innerText = "Module 1 - Introduction";
    desc.innerText = "Présentation générale de la formation.";
  }

  if(module === 2){
    player.src = "https://www.youtube.com/embed/tgbNymZ7vqY";
    title.innerText = "Module 2 - Mentalité";
    desc.innerText = "Développer une mentalité de réussite.";
  }

  if(module === 3){
    player.src = "https://www.youtube.com/embed/ysz5S6PUM-U";
    title.innerText = "Module 3 - Stratégie";
    desc.innerText = "Construire une stratégie efficace.";
  }

  if(module === 4){
    player.src = "https://www.youtube.com/embed/jNQXAC9IVRw";
    title.innerText = "Module 4 - Monétisation";
    desc.innerText = "Transformer vos compétences en revenus.";
  }
}
</script>

</body>
</html>
